name: AWS Resource Scanner CI

on:
  push:
    paths:
      - 'src/scanner/providers/aws.go'
      - 'src/scanner/types.go'
      - 'infra/ci/aws-scanner.yaml'
  pull_request:
    paths:
      - 'src/scanner/providers/aws.go'
      - 'src/scanner/types.go'
      - 'infra/ci/aws-scanner.yaml'

jobs:
  build-and-test:
    name: Build and Test AWS Resource Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20

      - name: Install dependencies
        run: go mod tidy

      - name: Build AWS Resource Scanner
        run: go build ./src/scanner/providers/aws.go ./src/scanner/types.go

      - name: Run tests
        run: go test ./src/scanner/... -v
