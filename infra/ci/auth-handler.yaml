name: CI for JWT Authentication Handler

on:
  push:
    branches:
      - main
      - feature/jwt-auth-handler
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test JWT Authentication Handler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20

      - name: Install Dependencies
        run: go mod tidy

      - name: Build Code
        run: go build ./src/auth/auth.go

      - name: Run Tests
        run: go test ./src/auth/... -v

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./
