name: Policy Engine CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/policy/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/policy/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # Use a recent stable Go version

    - name: Go Mod Tidy Check
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum || (echo "Error: go.mod or go.sum needs updating. Run 'go mod tidy' and commit the changes." && exit 1)

    - name: Run Go Vet
      run: go vet ./src/policy/...

    - name: Run Go Tests
      run: go test -v ./src/policy/...

    - name: Build Policy Engine Package
      run: go build ./src/policy
