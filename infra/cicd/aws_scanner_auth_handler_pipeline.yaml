name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Lint (golangci-lint) — fast fail for style, vet, staticcheck, etc.
  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.57.2
      - name: Run golangci-lint (scanner)
        run: golangci-lint run ./src/scanner/providers/aws.go
      - name: Run golangci-lint (auth)
        run: golangci-lint run ./src/auth/handler.go

  # 2. Build — ensure both modules compile independently (fail fast)
  build:
    name: Build Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build AWS Scanner
        run: go build -v ./src/scanner/providers/aws.go
      - name: Build Auth Handler
        run: go build -v ./src/auth/handler.go

  # 3. Test — run unit tests for each module, parallelized for fast feedback
  test-scanner:
    name: Test AWS Scanner
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Scanner Tests
        run: go test -v ./src/scanner/...

  test-auth:
    name: Test Auth Handler
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Auth Tests
        run: go test -v ./src/auth/...

  # 4. Aggregate — only proceed to further pipeline stages if all above pass
  # (e.g., security scan, build Docker image, etc.)
